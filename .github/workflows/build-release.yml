name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    name: Build Multi-Platform
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        goos: [ linux, darwin, windows ]
        goarch: [ amd64, arm64 ]
        exclude:
          - goos: windows
            goarch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
      
      - name: Build binary
        run: |
          mkdir -p release
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -o release/solarz-api-${{ matrix.goos }}-${{ matrix.goarch }} \
          -ldflags="-X main.Version=${{ github.ref_name }}" \
          -v .
        env:
          CGO_ENABLED: 0
      
      - name: Add executable permission
        if: matrix.goos != 'windows'
        run: chmod +x release/solarz-api-${{ matrix.goos }}-${{ matrix.goarch }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: solarz-api-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p final-release
          find artifacts -type f -name "solarz-api*" -exec cp {} final-release/ \;
          cd final-release
          for file in solarz-api*; do
            if [[ "$file" != *"windows"* ]]; then
              chmod +x "$file"
            fi
          done
          ls -lh
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: final-release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/solarz-api:latest
            ${{ secrets.DOCKER_USERNAME }}/solarz-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/solarz-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/solarz-api:buildcache,mode=max
        if: secrets.DOCKER_USERNAME != ''
