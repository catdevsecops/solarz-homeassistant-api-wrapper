---
name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    name: Build Multi-Platform
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: true

      - name: Build binary
        run: |
          mkdir -p release
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -o release/solarz-api-${{ matrix.goos }}-${{ matrix.goarch }} \
          -ldflags="-X main.Version=${{ github.ref_name }}" \
          -v .
        env:
          CGO_ENABLED: 0

      - name: Add executable permission
        if: matrix.goos != 'windows'
        run: chmod +x release/solarz-api-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: solarz-api-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p final-release
          find artifacts -type f -name "solarz-api*" -exec cp {} final-release/ \;
          cd final-release
          for file in solarz-api*; do
            if [[ "$file" != *"windows"* ]]; then
              chmod +x "$file"
            fi
          done
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: final-release/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
