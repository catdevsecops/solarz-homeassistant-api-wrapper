name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
      
      - name: Download dependencies
        run: go mod download
      
      - name: Verify dependencies
        run: go mod verify
      
      - name: Format check
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -s -d .
            exit 1
          fi
      
      - name: Lint with go vet
        run: go vet ./...
      
      - name: Run tests
        run: go test -v -race -timeout=5m ./...
      
      - name: Generate coverage report
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true
      
      - name: Display coverage
        run: go tool cover -func=coverage.out | tail -1
      
      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | tail -1 | awk '{print int($3)}')
          echo "Code coverage: ${coverage}%"
          if [ $coverage -lt 50 ]; then
            echo "Coverage is below 50% threshold!"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
      
      - name: Run gosec security scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-report.sarif ./...'
        continue-on-error: true
      
      - name: Upload gosec results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: gosec-report.sarif
        if: always()

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
      
      - name: Build binary
        run: |
          mkdir -p build
          go build -o build/solarz-api -v .
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
      
      - name: Verify binary
        run: ./build/solarz-api --help 2>&1 || true
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: solarz-api-binary
          path: build/solarz-api
          retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

  benchmark:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ ./... | tee benchmark.txt
      
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'go'
          output-file-path: benchmark.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, security, build, lint]
    if: failure()
    
    steps:
      - name: Check test status
        run: |
          echo "Pipeline failed!"
          echo "Jobs failed:"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Lint: ${{ needs.lint.result }}"
